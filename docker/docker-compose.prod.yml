version: '3.8'

services:
  clanker-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: clanker9000:latest
    container_name: clanker-bot
    restart: unless-stopped

    environment:
      # Discord
      - DISCORD_TOKEN=${DISCORD_TOKEN}

      # OpenAI (for LLM and STT)
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # ElevenLabs (for TTS)
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}

      # Optional: Custom config path
      - CLANKER_CONFIG_PATH=/app/config.yaml

      # Logging and debugging (set LOG_LEVEL=DEBUG and VOICE_DEBUG=1 for troubleshooting)
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - VOICE_DEBUG=${VOICE_DEBUG:-}
      - VOICE_DEBUG_DIR=/app/voice_debug

      # Python settings
      - PYTHONUNBUFFERED=1
      - TORCH_HOME=/app/.cache/torch

    volumes:
      # Mount config file
      - ./config.yaml:/app/config.yaml:ro

      # Persist torch model cache
      - torch-cache:/app/.cache/torch

      # Optional: Mount logs directory
      - ./logs:/app/logs

      # Voice debug capture (populated when VOICE_DEBUG=1)
      - ./voice_debug:/app/voice_debug

    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

volumes:
  torch-cache:
    driver: local

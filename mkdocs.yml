site_name: Clanker9000
site_url: https://safurrier.github.io/clanker-bot/
site_description: SDK-first Discord bot with chat, voice pipeline, shitposts, and CLI
site_author: safurrier

repo_name: safurrier/clanker-bot
repo_url: https://github.com/safurrier/clanker-bot
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.action.edit
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/library

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: QUICKSTART.md
    - Architecture: ARCHITECTURE.md
    - Contributing: CONTRIBUTING.md
  - Guides:
    - Audio Capture: audio-capture.md
    - Voice Debugging: voice-debugging.md
    - Meme Pipeline: meme-pipeline.md
    - Container Setup: container-setup.md
    - Voice Ingest Pipeline: voice_ingest_pipeline.md
    - Transcript Examples: transcript-examples.md
  - Reference:
    - Configuration: config_schema.md
    - Discord.py Notes: discordpy_notes.md
    - API Documentation: reference/api.md
  - Planning:
    - Future Work: FUTURE_WORK.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/safurrier/clanker-bot